<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tableau de bord formateur — Majubah Campus</title>
<style>
  :root{ --corail:#e0533c; --navy:#243840; --muted:#5b6a70; --line:#e3e8ea; --bg:#f7f9fa; --card:#fff; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--navy); background:var(--bg); }
  header{ background:#fff; border-bottom:1px solid var(--line); padding:18px 24px; }
  header .brand{ font-weight:700; letter-spacing:.12em; text-transform:uppercase; font-size:13px; color:var(--corail); }
  header h1{ margin:4px 0 0; font-size:22px; }
  .wrap{ max-width:1000px; margin:0 auto; padding:32px 24px; }
  .login{ max-width:360px; margin:8vh auto; background:#fff; border:1px solid var(--line); border-radius:14px; padding:28px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.05); }
  .login h2{ margin:0 0 6px; }
  .login p{ color:var(--muted); font-size:14px; margin:0 0 20px; }
  input{ width:100%; box-sizing:border-box; padding:13px 14px; border:1px solid var(--line); border-radius:10px; font-size:15px; margin-bottom:10px; }
  button{ width:100%; padding:13px; background:var(--corail); color:#fff; border:none; border-radius:999px; font-weight:700; font-size:15px; cursor:pointer; }
  button.small{ width:auto; padding:8px 16px; font-size:13px; }
  .msg{ color:var(--corail); font-size:13px; min-height:18px; margin:6px 0 10px; }
  .toolbar{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:18px; }
  .toolbar .sub{ color:var(--muted); font-size:14px; }
  table{ width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; font-size:14px; }
  th,td{ text-align:left; padding:13px 14px; border-top:1px solid var(--line); }
  thead th{ background:var(--navy); color:#fff; border:none; font-size:13px; white-space:nowrap; }
  tbody tr:first-child td{ border-top:none; }
  td.name{ font-weight:700; }
  .pill{ display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; }
  .ok{ background:#e7f6ec; color:#1f9d57; }
  .mid{ background:#fdf1e9; color:#c2622c; }
  .no{ background:#f1f3f4; color:#8a979c; }
  .bar{ height:7px; background:#eef1f2; border-radius:999px; overflow:hidden; min-width:90px; }
  .bar > i{ display:block; height:100%; background:var(--corail); border-radius:999px; }
  .hide{ display:none; }
  .foot{ color:#9aa7ac; font-size:12px; margin-top:18px; text-align:center; }
</style>
</head>
<body>
  <header>
    <div class="brand">Majubah Campus</div>
    <h1>Tableau de bord formateur</h1>
  </header>

  <!-- Écran de connexion formateur -->
  <div id="login" class="login">
    <h2>Accès formateur</h2>
    <p>Entre ton code formateur pour voir la progression des apprenants.</p>
    <input id="code" type="password" placeholder="Code formateur" autocomplete="off">
    <p class="msg" id="msg"></p>
    <button id="go">Voir le tableau de bord</button>
  </div>

  <!-- Tableau -->
  <div id="dash" class="wrap hide">
    <div class="toolbar">
      <div class="sub" id="count"></div>
      <button class="small" id="refresh">Actualiser</button>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Apprenant</th>
            <th>Méthode</th>
            <th>Quiz (/20)</th>
            <th>Checklist (/10)</th>
            <th>Examen blanc</th>
            <th>Dernière activité</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <p class="foot">Les données se mettent à jour automatiquement quand les apprenants travaillent.</p>
  </div>

<script>
(function () {
  var SB_URL = 'https://jvokltvsmsucgpzjbyli.supabase.co';
  var SB_KEY = 'sb_publishable_1bGhtSLy3tcF50HDXMTU-w_kg3b8IIK';

  function rpc(fn, body) {
    return fetch(SB_URL + '/rest/v1/rpc/' + fn, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; });
  }

  function count(obj) { if (!obj) return 0; var n = 0; for (var k in obj) if (obj[k]) n++; return n; }
  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

  function fmtDate(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' }); }
    catch (e) { return '—'; }
  }
  function bar(n, total) {
    var pct = total ? Math.round(100 * n / total) : 0;
    return '<div style="display:flex; align-items:center; gap:8px;"><div class="bar"><i style="width:' + pct + '%"></i></div><span>' + n + '</span></div>';
  }
  function examCell(reveal) {
    reveal = reveal || 0;
    if (reveal >= 5) return '<span class="pill ok">Terminé</span>';
    if (reveal > 0) return '<span class="pill mid">' + reveal + ' / 5</span>';
    return '<span class="pill no">Pas commencé</span>';
  }
  function methodeCell(b) { return b ? '<span class="pill ok">Lue</span>' : '<span class="pill no">—</span>'; }

  var currentCode = '';

  function render(rows) {
    var tbody = document.getElementById('rows');
    tbody.innerHTML = '';
    rows.forEach(function (r) {
      var d = r.data || {};
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="name">' + esc(r.prenom) + '</td>' +
        '<td>' + methodeCell(d.methodeRead) + '</td>' +
        '<td>' + bar(count(d.checked), 20) + '</td>' +
        '<td>' + bar(count(d.checklist), 10) + '</td>' +
        '<td>' + examCell(d.examReveal) + '</td>' +
        '<td>' + fmtDate(r.updated_at) + '</td>';
      tbody.appendChild(tr);
    });
    document.getElementById('count').textContent = rows.length + ' apprenant' + (rows.length > 1 ? 's' : '');
  }

  function load(code) {
    var msg = document.getElementById('msg');
    var go = document.getElementById('go');
    go.textContent = 'Chargement…'; go.disabled = true; msg.textContent = '';
    rpc('tableau_formateur', { p_code_formateur: code }).then(function (rows) {
      go.textContent = 'Voir le tableau de bord'; go.disabled = false;
      if (rows === null || !Array.isArray(rows) || rows.length === 0) {
        msg.textContent = 'Code incorrect (ou aucun apprenant).';
        return;
      }
      currentCode = code;
      try { sessionStorage.setItem('mj_prof_code', code); } catch (e) {}
      document.getElementById('login').classList.add('hide');
      document.getElementById('dash').classList.remove('hide');
      render(rows);
    });
  }

  document.getElementById('go').addEventListener('click', function () {
    var code = document.getElementById('code').value.trim();
    if (!code) { document.getElementById('msg').textContent = 'Entre ton code formateur.'; return; }
    load(code);
  });
  document.getElementById('code').addEventListener('keydown', function (e) { if (e.key === 'Enter') document.getElementById('go').click(); });
  document.getElementById('refresh').addEventListener('click', function () { if (currentCode) load(currentCode); });

  // Reconnexion auto dans la session de l'onglet
  try {
    var saved = sessionStorage.getItem('mj_prof_code');
    if (saved) { document.getElementById('code').value = saved; load(saved); }
  } catch (e) {}
})();
</script>
</body>
</html>
